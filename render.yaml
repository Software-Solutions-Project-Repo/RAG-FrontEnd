services:
  - type: web
    name: rag-ingest-api
    runtime: python
    buildCommand: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2')"
    startCommand: sh -c "uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: VITE_SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel frontend URL
